apiVersion: apps/v1
kind: Deployment
metadata:
  name: fine-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fine-service
  template:
    metadata:
      labels:
        app: fine-service
    spec:
      containers:
        - name: fine-service
          image: fine-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: fine-service
spec:
  selector:
    app: fine-service
  ports:
    - port: 8000
      targetPort: 8000
